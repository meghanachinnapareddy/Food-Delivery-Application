<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Customer Registration</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

	<div class="register-container">

		<div class="register-card">

			<h2 class="register-title">Customer Registration</h2>

			<form action="register" method="post" class="register-form">

				<!-- Username -->
				<div class="input-group">
					<label for="userName" class="input-label">User Name</label> <input
						type="text" id="userName" name="userName" class="input-field"
						placeholder="Enter your username" required>
				</div>

				<!-- Email -->
				<div class="input-group">
					<label for="email" class="input-label">Email</label> <input
						type="email" id="email" name="email" class="input-field"
						placeholder="Enter your email" required>
				</div>

				<!-- Password -->
				<div class="input-group">
					<label for="password" class="input-label">Password</label> <input
						type="password" id="password" name="password" class="input-field"
						placeholder="Enter password" required>
				</div>

				<!-- Confirm Password -->
				<div class="input-group">
					<label for="confirmPassword" class="input-label">Confirm
						Password</label> <input type="password" id="confirmPassword"
						name="confirmPassword" class="input-field"
						placeholder="Re-enter password" required>
				</div>

				<!-- Address -->
				<div class="input-group">
					<label for="address" class="input-label">Address</label>
					<textarea id="address" name="address" class="textarea-field"
						placeholder="Enter your address" rows="3" required></textarea>
				</div>

				<!-- Phone Number -->
				<div class="input-group">
					<label for="phoneNumber" class="input-label">Phone Number</label> <input
						type="text" id="phoneNumber" name="phoneNumber"
						class="input-field" placeholder="Enter phone number" required>
				</div>

				<!-- Hidden role -->
				<input type="hidden" name="role" value="customer">

				<!-- Button -->
				<button type="submit" class="register-button">Register</button>
				
				<div class="login-redirect">
			Already registered? click here to <a href="login.html" class="login-link">Login</a>
		</div>

			</form>

		</div>
		

	</div>


</body>
</html>
